<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Water Gun Slinger: Persistence Edition</title>
    <style>
      body {
        margin: 0;
        background: #000;
        color: white;
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      canvas {
        background: #111;
        border: 3px solid #3498db;
        display: none;
      }
      #main-menu {
        text-align: center;
        background: rgba(20, 20, 20, 0.9);
        padding: 30px;
        border-radius: 20px;
        border: 2px solid #3498db;
        width: 400px;
      }
      .stat-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px 0;
        background: #222;
        padding: 10px;
        border-radius: 5px;
      }
      button {
        padding: 8px 15px;
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      #start-btn {
        width: 100%;
        padding: 15px;
        font-size: 20px;
        margin-top: 20px;
        background: #2ecc71;
      }
      #ui {
        position: absolute;
        top: 10px;
        width: 780px;
        display: none;
        justify-content: space-between;
        pointer-events: none;
      }
      .bar-container {
        width: 150px;
        height: 15px;
        background: #333;
        border: 1px solid #fff;
      }
      #hp-fill {
        width: 100%;
        height: 100%;
        background: #ff4444;
      }
      #ammo-ui {
        position: absolute;
        bottom: 80px;
        right: 20px;
        display: none;
      }
      #skill-ui {
        position: absolute;
        bottom: 20px;
        display: none;
        gap: 10px;
      }
      .skill-slot {
        width: 50px;
        height: 50px;
        border: 2px solid #3498db;
        background: rgba(0, 0, 0, 0.5);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
      .cd-overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.7);
        height: 0%;
      }
    </style>
  </head>
  <body>
    <div id="main-menu">
      <h1>🌊 SLINGER MENU</h1>
      <div style="color: #f1c40f; font-size: 20px; margin-bottom: 15px">
        보유 골드: <span id="total-gold">0</span>
      </div>

      <div class="stat-group">
        <span>💪 힘 (Dmg: <span id="stat-dmg">5</span>)</span>
        <button onclick="upgrade('dmg')"><span id="cost-dmg">5</span>G</button>
      </div>
      <div class="stat-group">
        <span>👟 이속 (Spd: <span id="stat-spd">4</span>)</span>
        <button onclick="upgrade('spd')"><span id="cost-spd">5</span>G</button>
      </div>
      <div class="stat-group">
        <span>🏹 사거리 (Rng: <span id="stat-rng">300</span>)</span>
        <button onclick="upgrade('rng')"><span id="cost-rng">5</span>G</button>
      </div>
      <div class="stat-group">
        <span>⏳ 쿨감 (CD: <span id="stat-cd">0</span>%)</span>
        <button onclick="upgrade('cd')"><span id="cost-cd">5</span>G</button>
      </div>

      <button id="start-btn">GAME START</button>
    </div>

    <div id="ui">
      <div>
        HP
        <div class="bar-container"><div id="hp-fill"></div></div>
      </div>
      <div id="stage-txt" style="font-size: 24px; font-weight: bold">
        STAGE 1
      </div>
      <div>
        💰 <span id="gold-display">0</span> | 🔑 <span id="key-txt">0</span>
      </div>
    </div>
    <div id="ammo-ui">💧 AMMO: <span id="ammo-txt">15 / ∞</span></div>
    <div id="skill-ui">
      <div class="skill-slot">
        Q
        <div id="cd-q" class="cd-overlay"></div>
      </div>
      <div class="skill-slot">
        E
        <div id="cd-e" class="cd-overlay"></div>
      </div>
      <div class="skill-slot" style="border-color: gold">
        R
        <div id="cd-r" class="cd-overlay"></div>
      </div>
    </div>

    <canvas id="game"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      canvas.width = 800;
      canvas.height = 600;

      // --- [로컬 스토리지 데이터 관리] ---
      let totalGold = 0;
      let upStats = { dmg: 5, spd: 4, rng: 300, cd: 0 };
      let upCosts = { dmg: 5, spd: 5, rng: 5, cd: 5 };

      function saveGame() {
        const data = { totalGold, upStats, upCosts };
        localStorage.setItem("waterGunSlinger_Save", JSON.stringify(data));
      }

      function loadGame() {
        const saved = localStorage.getItem("waterGunSlinger_Save");
        if (saved) {
          const data = JSON.parse(saved);
          totalGold = data.totalGold;
          upStats = data.upStats;
          upCosts = data.upCosts;
        }
      }

      function upgrade(type) {
        if (totalGold >= upCosts[type]) {
          totalGold -= upCosts[type];
          if (type === "dmg") upStats.dmg += 2;
          if (type === "spd") upStats.spd += 0.5;
          if (type === "rng") upStats.rng += 50;
          if (type === "cd") upStats.cd = Math.min(upStats.cd + 5, 50);
          upCosts[type] += 5;
          saveGame(); // 업그레이드 직후 저장
          updateMenu();
        }
      }

      function updateMenu() {
        document.getElementById("total-gold").innerText = totalGold;
        for (let key in upStats) {
          document.getElementById(`stat-${key}`).innerText = upStats[key];
          document.getElementById(`cost-${key}`).innerText = upCosts[key];
        }
      }

      // 초기 로드 실행
      loadGame();
      updateMenu();

      // --- [게임 변수] ---
      let gameActive = false;
      let stage = 1;
      const player = {
        x: 400,
        y: 300,
        hp: 50,
        maxHp: 50,
        speed: 4,
        gold: 0,
        keys: 0,
        angle: 0,
        ammo: 15,
        reloading: false,
        range: 300,
        dmg: 5,
      };
      let enemies = [],
        projectiles = [],
        enemyProjectiles = [],
        waves = [],
        doors = [],
        drops = [],
        warnings = [];
      const keysInput = {};
      let mouse = { x: 0, y: 0 };
      const skills = {
        q: { cur: 0, max: 10000 },
        e: { cur: 0, max: 2000 },
        r: { cur: 0, max: 30000 },
      };

      document.getElementById("start-btn").onclick = () => {
        document.getElementById("main-menu").style.display = "none";
        canvas.style.display = "block";
        document
          .querySelectorAll("#ui, #ammo-ui, #skill-ui")
          .forEach((el) => (el.style.display = "flex"));
        if (document.getElementById("ammo-ui"))
          document.getElementById("ammo-ui").style.display = "block";

        stage = 1;
        player.hp = 50;
        player.maxHp = 50;
        player.gold = 0;
        player.keys = 0;
        player.speed = upStats.spd;
        player.range = upStats.rng;
        player.dmg = upStats.dmg;
        player.x = 400;
        player.y = 300;
        player.ammo = 15;
        player.reloading = false;

        gameActive = true;
        spawn();
        loop();
      };

      canvas.addEventListener("mousemove", (e) => {
        const r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left;
        mouse.y = e.clientY - r.top;
      });

      canvas.addEventListener("mousedown", () => {
        if (!gameActive || player.reloading || player.ammo <= 0) return;
        player.ammo--;
        const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        projectiles.push({
          x: player.x,
          y: player.y,
          ox: player.x,
          oy: player.y,
          vx: Math.cos(a) * 12,
          vy: Math.sin(a) * 12,
          dmg: player.dmg,
        });
        if (player.ammo === 0) reload();
      });

      function reload() {
        player.reloading = true;
        setTimeout(() => {
          player.ammo = 15;
          player.reloading = false;
        }, 3000);
      }

      function spawn() {
        enemies = [];
        warnings = [];
        enemyProjectiles = [];
        doors = [];
        drops = [];
        let type = "normal",
          hp = 10 + stage * 2,
          size = 30,
          count = 4 + Math.floor(stage / 2);
        if (stage % 10 === 0) {
          type = "boss";
          hp = stage === 10 ? 200 : 400;
          size = 70;
          count = 1;
        } else if (stage % 5 === 0) {
          type = "mid";
          hp = 100;
          size = 50;
          count = 1;
        }

        for (let i = 0; i < count; i++) {
          enemies.push({
            x: Math.random() * 700 + 50,
            y: Math.random() * 500 + 50,
            hp,
            maxHp: hp,
            size,
            type,
            skillCD: 0,
            dashCD: 0,
          });
        }
      }

      window.onkeydown = (e) => {
        const k = e.key.toLowerCase();
        keysInput[k] = true;
        const cdReduc = 1 - upStats.cd / 100;
        if (k === "q" && skills.q.cur <= 0) {
          skills.q.cur = skills.q.max * cdReduc;
          const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
          projectiles.push({
            x: player.x,
            y: player.y,
            ox: player.x,
            oy: player.y,
            vx: Math.cos(a) * 10,
            vy: Math.sin(a) * 10,
            dmg: 15,
            isSkill: true,
          });
        }
        if (k === "e" && skills.e.cur <= 0) {
          skills.e.cur = skills.e.max * cdReduc;
          const a = Math.atan2(mouse.y - player.y, mouse.x - player.x);
          player.x += Math.cos(a) * 150;
          player.y += Math.sin(a) * 150;
        }
        if (k === "r" && skills.r.cur <= 0) {
          skills.r.cur = skills.r.max * cdReduc;
          waves.push({ x: 0, w: 120 });
        }
      };
      window.onkeyup = (e) => (keysInput[e.key.toLowerCase()] = false);

      function update(dt) {
        if (!gameActive) return;
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        for (let s in skills) if (skills[s].cur > 0) skills[s].cur -= dt;

        if (keysInput["w"] && player.y > 20) player.y -= player.speed;
        if (keysInput["s"] && player.y < 580) player.y += player.speed;
        if (keysInput["a"] && player.x > 20) player.x -= player.speed;
        if (keysInput["d"] && player.x < 780) player.x += player.speed;

        projectiles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          if (!p.isSkill && Math.hypot(p.x - p.ox, p.y - p.oy) > player.range) {
            projectiles.splice(i, 1);
            return;
          }
          enemies.forEach((en) => {
            if (Math.hypot(p.x - en.x, p.y - en.y) < en.size / 2) {
              en.hp -= p.dmg;
              projectiles.splice(i, 1);
            }
          });
        });

        waves.forEach((w, i) => {
          w.x += 10;
          enemies.forEach((en) => {
            if (en.x > w.x && en.x < w.x + w.w) en.hp -= 2;
          });
          if (w.x > 800) waves.splice(i, 1);
        });

        enemies.forEach((en, i) => {
          let d = Math.hypot(player.x - en.x, player.y - en.y);

          // --- [적 이동 로직: 보스도 이제 움직임] ---
          let moveSpeed = 1.5;
          if (en.type === "mid") moveSpeed = 1.0;
          if (en.type === "boss") moveSpeed = 0.7;

          if (d > 10) {
            en.x += ((player.x - en.x) / d) * moveSpeed;
            en.y += ((player.y - en.y) / d) * moveSpeed;
          }

          // --- [특수 패턴] ---
          if (en.type === "normal" && stage >= 10) {
            en.dashCD += dt;
            if (en.dashCD > 3000) {
              en.x += ((player.x - en.x) / d) * 60;
              en.y += ((player.y - en.y) / d) * 60;
              en.dashCD = 0;
            }
          }

          en.skillCD += dt;
          if (en.type === "mid" && en.skillCD > 5000) {
            let tx = player.x,
              ty = player.y;
            warnings.push({ x: tx, y: ty, r: 80, cur: 1500 });
            setTimeout(() => {
              if (Math.hypot(player.x - tx, player.y - ty) < 80)
                player.hp -= 15;
              if (stage >= 15) {
                for (let j = 0; j < 8; j++) {
                  let ang = (Math.PI / 4) * j;
                  enemyProjectiles.push({
                    x: tx,
                    y: ty,
                    vx: Math.cos(ang) * 5,
                    vy: Math.sin(ang) * 5,
                    dmg: 7,
                    r: 6,
                  });
                }
              }
            }, 1500);
            en.skillCD = 0;
          } else if (en.type === "boss" && en.skillCD > 4000) {
            let count = stage === 10 ? 8 : 12;
            let dmg = stage === 10 ? 10 : 20;
            let r = stage === 10 ? 10 : 20;
            for (let j = 0; j < count; j++) {
              let ang = ((Math.PI * 2) / count) * j;
              enemyProjectiles.push({
                x: en.x,
                y: en.y,
                vx: Math.cos(ang) * 4,
                vy: Math.sin(ang) * 4,
                dmg,
                r,
              });
            }
            en.skillCD = 0;
          }

          if (d < en.size / 2) player.hp -= 0.1;
          if (en.hp <= 0) {
            drops.push({ x: en.x, y: en.y, type: "gold" });
            if (enemies.length === 1)
              drops.push({ x: en.x + 15, y: en.y, type: "key" });
            enemies.splice(i, 1);
          }
        });

        enemyProjectiles.forEach((ep, i) => {
          ep.x += ep.vx;
          ep.y += ep.vy;
          if (Math.hypot(player.x - ep.x, player.y - ep.y) < 15) {
            player.hp -= ep.dmg;
            enemyProjectiles.splice(i, 1);
          } else if (ep.x < 0 || ep.x > 800 || ep.y < 0 || ep.y > 600)
            enemyProjectiles.splice(i, 1);
        });

        warnings.forEach((w, i) => {
          w.cur -= dt;
          if (w.cur <= 0) warnings.splice(i, 1);
        });

        drops.forEach((dr, i) => {
          if (Math.hypot(player.x - dr.x, player.y - dr.y) < 30) {
            if (dr.type === "gold") player.gold += 5;
            else player.keys++;
            drops.splice(i, 1);
          }
        });

        if (enemies.length === 0) {
          if (doors.length === 0)
            doors = [
              { x: 400, y: 50 },
              { x: 400, y: 550 },
              { x: 50, y: 300 },
              { x: 750, y: 300 },
            ];
          doors.forEach((dr) => {
            if (
              Math.hypot(player.x - dr.x, player.y - dr.y) < 40 &&
              player.keys > 0
            ) {
              player.keys--;
              stage++;
              player.x = 400;
              player.y = 300;
              spawn();
            }
          });
        }

        // --- [UI 업데이트] ---
        document.getElementById("hp-fill").style.width =
          (player.hp / player.maxHp) * 100 + "%";
        document.getElementById("stage-txt").innerText = "STAGE " + stage;
        document.getElementById("ammo-txt").innerText = player.reloading
          ? "RELOADING..."
          : player.ammo + " / ∞";
        document.getElementById("gold-display").innerText = player.gold;
        document.getElementById("key-txt").innerText = player.keys;
        for (let s in skills)
          document.getElementById("cd-" + s).style.height =
            (skills[s].cur / skills[s].max) * 100 + "%";

        if (player.hp <= 0) {
          totalGold += player.gold;
          gameActive = false;
          saveGame(); // 게임오버 시 최종 골드 저장
          alert("게임 오버! 획득 골드: " + player.gold);
          canvas.style.display = "none";
          document.getElementById("main-menu").style.display = "block";
          document
            .querySelectorAll("#ui, #ammo-ui, #skill-ui")
            .forEach((el) => (el.style.display = "none"));
          updateMenu();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, 800, 600);
        doors.forEach((d) => {
          ctx.fillStyle = "#8b4513";
          ctx.fillRect(d.x - 20, d.y - 20, 40, 40);
        });
        warnings.forEach((w) => {
          ctx.fillStyle = "rgba(255,0,0,0.3)";
          ctx.beginPath();
          ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
          ctx.fill();
        });
        drops.forEach((d) => {
          ctx.fillStyle = d.type === "gold" ? "#f1c40f" : "#00f2ff";
          ctx.beginPath();
          ctx.arc(d.x, d.y, 6, 0, Math.PI * 2);
          ctx.fill();
        });
        enemies.forEach((en) => {
          ctx.fillStyle =
            en.type === "normal"
              ? "#ff4444"
              : en.type === "mid"
                ? "#e67e22"
                : "#9b59b6";
          ctx.fillRect(
            en.x - en.size / 2,
            en.y - en.size / 2,
            en.size,
            en.size,
          );
          ctx.fillStyle = "red";
          ctx.fillRect(
            en.x - en.size / 2,
            en.y - en.size / 2 - 10,
            (en.hp / en.maxHp) * en.size,
            5,
          );
        });
        enemyProjectiles.forEach((ep) => {
          ctx.fillStyle = "#3498db";
          ctx.beginPath();
          ctx.arc(ep.x, ep.y, ep.r, 0, Math.PI * 2);
          ctx.fill();
        });

        // 플레이어
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.fillStyle = "#2ecc71";
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#333";
        ctx.fillRect(10, -3, 15, 6);
        ctx.restore();

        ctx.fillStyle = "#00f2ff";
        projectiles.forEach((p) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.fillStyle = "rgba(52, 152, 219, 0.4)";
        waves.forEach((w) => ctx.fillRect(w.x, 0, w.w, 600));
      }

      let last = Date.now();
      function loop() {
        if (!gameActive) return;
        let now = Date.now();
        update(now - last);
        draw();
        last = now;
        requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
